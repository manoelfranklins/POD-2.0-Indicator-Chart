property.processKey=Prozessschlüssel
property.processKey.desc=Der Schlüssel des aufzurufenden Produktionsprozesses (z.B. REG_xxx-xxx-xxx)
property.chartTitle=Diagrammtitel
property.chartTitle.desc=Im Diagramm-Header angezeigter Titel
property.widgetWidth=Breite
property.widgetWidth.desc=CSS-Breite des Widgets, z.B. 50%, 400px. 50% für zwei nebeneinander platzierte Instanzen verwenden.
property.updateInterval=Aktualisierungsintervall (Sekunden)
property.updateInterval.desc=Wie oft der Produktionsprozess abgefragt wird, in Sekunden. Minimum 3, Standard 10.

property.thresholdLow=Unterer Schwellenwert
property.thresholdLow.desc=Minimaler Akzeptanzwert. Das Diagramm wechselt zur Farbe "Unterhalb Minimum", wenn der Wert darunter fällt. Leer lassen zum Deaktivieren.
property.thresholdHigh=Oberer Schwellenwert
property.thresholdHigh.desc=Maximaler Akzeptanzwert. Das Diagramm wechselt zur Farbe "Oberhalb Maximum", wenn der Wert überschritten wird. Leer lassen zum Deaktivieren.
property.colorBelowLow=Farbe — Unterhalb Minimum
property.colorBelowLow.desc=Hex-Farbe wenn der Wert unter dem unteren Schwellenwert liegt (z.B. #BB0000).
property.colorNormal=Farbe — Normal
property.colorNormal.desc=Hex-Farbe wenn der Wert im Normalbereich liegt (z.B. #188918).
property.colorAboveHigh=Farbe — Oberhalb Maximum
property.colorAboveHigh.desc=Hex-Farbe wenn der Wert den oberen Schwellenwert überschreitet (z.B. #E9730C).
