# Indicator Chart Widget - Chinese Simplified
widget.title=流程输出

badge.live=实时

label.currentValue=当前值
label.dataPoints=数据点
label.lastUpdated=最后更新
label.noOutput=无输出

chart.noData=等待数据...

status.loading=加载中...
status.fetching=正在获取数据...
status.live=实时 — 每{0}秒更新
status.error=获取数据出错
status.nonNumeric=收到非数字值

error.unknown=发生未知错误

property.processKey=流程密鑰
property.processKey.desc=要调用的生产流程密鑰（例如 REG_xxx-xxx-xxx）
property.chartTitle=图表标题
property.chartTitle.desc=显示在图表标题栏中的标题
property.widgetWidth=宽度
property.widgetWidth.desc=控件的CSS宽度，例如50%、400px。两个并排实例请使用50%。
property.updateInterval=更新间隔（秒）
property.updateInterval.desc=轮询生产流程的频率（秒）。最小值为3，默认值为10。

property.thresholdLow=低阈值
property.thresholdLow.desc=最低可接受值。当值低于此数值时，图表切换为"低于下限"颜色。留空则禁用。
property.thresholdHigh=高阈值
property.thresholdHigh.desc=最高可接受值。当值超过此数值时，图表切换为"超过上限"颜色。留空则禁用。
property.colorBelowLow=颜色 — 低于下限
property.colorBelowLow.desc=值低于低阈值时的十六进制颜色（例如#BB0000）。
property.colorNormal=颜色 — 正常
property.colorNormal.desc=值在正常范围内时的十六进制颜色（例如#188918）。
property.colorAboveHigh=颜色 — 超过上限
property.colorAboveHigh.desc=值超过高阈值时的十六进制颜色（例如#E9730C）。
