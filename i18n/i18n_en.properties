# Indicator Chart Widget - English
widget.title=Process Output

badge.live=LIVE

label.currentValue=Current Value
label.dataPoints=Data Points
label.lastUpdated=Last Updated
label.noOutput=No output

chart.noData=Waiting for data...

status.loading=Loading...
status.fetching=Fetching data...
status.live=Live — updating every {0}s
status.error=Error fetching data
status.nonNumeric=Non-numeric value received

error.unknown=An unknown error occurred

property.processKey=Process Key
property.processKey.desc=The key of the production process to call (e.g. REG_xxx-xxx-xxx)
property.chartTitle=Chart Title
property.chartTitle.desc=Title displayed in the chart header
property.widgetWidth=Width
property.widgetWidth.desc=CSS width of the widget, e.g. 50%, 400px. Use 50% for two side-by-side instances.
property.updateInterval=Update Interval (seconds)
property.updateInterval.desc=How often to poll the production process, in seconds. Minimum is 3. Default is 10.

property.thresholdLow=Low Threshold
property.thresholdLow.desc=Minimum acceptable value. Chart turns to the Below Low color when value drops below this. Leave empty to disable.
property.thresholdHigh=High Threshold
property.thresholdHigh.desc=Maximum acceptable value. Chart turns to the Above High color when value exceeds this. Leave empty to disable.
property.colorBelowLow=Color — Below Low
property.colorBelowLow.desc=Hex color when value is below the Low Threshold (e.g. #BB0000).
property.colorNormal=Color — Normal
property.colorNormal.desc=Hex color when value is within range (e.g. #188918).
property.colorAboveHigh=Color — Above High
property.colorAboveHigh.desc=Hex color when value exceeds the High Threshold (e.g. #E9730C).
