# Indicator Chart Widget - Japanese
widget.title=プロセス出力

badge.live=ライブ

label.currentValue=現在値
label.dataPoints=データポイント
label.lastUpdated=最終更新
label.noOutput=出力なし

chart.noData=データを待機中...

status.loading=読み込み中...
status.fetching=データを取得中...
status.live=ライブ — {0}秒ごとに更新
status.error=データ取得エラー
status.nonNumeric=非数値を受信しました

error.unknown=不明なエラーが発生しました

property.processKey=プロセスキー
property.processKey.desc=呼び出す生産プロセスのキー（例: REG_xxx-xxx-xxx）
property.chartTitle=チャートタイトル
property.chartTitle.desc=チャートヘッダーに表示されるタイトル
property.widgetWidth=幅
property.widgetWidth.desc=ウィジェットのCSS幅（例：50%、400px）。2つを横並びにするには50%を使用。
property.updateInterval=更新間隔（秒）
property.updateInterval.desc=生産プロセスをポーリングする頻度（秒）。最小値は3、デフォルトは10。

property.thresholdLow=下限しきい値
property.thresholdLow.desc=最低許容値。値がこの数値を下回ると、グラフが「下限以下」の色に変わります。空白で無効化。
property.thresholdHigh=上限しきい値
property.thresholdHigh.desc=最高許容値。値がこの数値を超えると、グラフが「上限超過」の色に変わります。空白で無効化。
property.colorBelowLow=色 — 下限以下
property.colorBelowLow.desc=値が下限しきい値を下回る場合の16進数カラー（例：#BB0000）。
property.colorNormal=色 — 正常
property.colorNormal.desc=値が正常範囲内の場合の16進数カラー（例：#188918）。
property.colorAboveHigh=色 — 上限超過
property.colorAboveHigh.desc=値が上限しきい値を超えた場合の16進数カラー（例：#E9730C）。
